name: Docker build (PR)

on:
  pull_request:
    paths:
      - Dockerfile
      - package.json
      - package-lock.json
      - 'src/**'
      - vite.config.ts
      - 'tsconfig*.json'
      - index.html
      - eslint.config.js
      - .github/workflows/docker-build-pr.yml
      - .github/workflows/docker-publish-main.yml

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64 \
            --label org.opencontainers.image.revision="${{ github.sha }}" \
            --tag voidscape-admin:ci \
            --load \
            .
